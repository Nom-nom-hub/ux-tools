name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --locked
          mv target/release/ux ux-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.api_url }}/repos/${{ github.repository }}/releases/${{ github.event.release.id }}
          asset_path: ./ux-${{ matrix.target }}
          asset_name: ux-${{ matrix.target }}
          asset_content_type: application/octet-stream

      - name: Create tarball
        run: tar -czf ux-${{ matrix.target }}.tar.gz ux-${{ matrix.target }}

      - name: Upload tarball
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.api_url }}/repos/${{ github.repository }}/releases/${{ github.event.release.id }}
          asset_path: ./ux-${{ matrix.target }}.tar.gz
          asset_name: ux-${{ matrix.target }}.tar.gz
          asset_content_type: application/gzip