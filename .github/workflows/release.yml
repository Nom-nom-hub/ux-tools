name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: ux-tools
        run: cargo build --release --locked

      - name: Rename
        run: mv ux-tools/target/release/ux ux-${{ matrix.target }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ux-${{ matrix.target }}
          path: ux-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "ux ${{ github.ref_name }}" \
            --notes-file - << 'EOF'
          See [CHANGELOG](CHANGELOG.md) for release details.
          EOF

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in artifacts/ux-*; do
            gh release upload ${{ github.ref_name }} "$f" --clobber
          done