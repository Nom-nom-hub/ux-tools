name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        target: [aarch64-apple-darwin, x86_64-apple-darwin, x86_64-unknown-linux-gnu]
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: ux-tools
        run: cargo build --release --locked

      - name: Package
        run: |
          cd ux-tools/target/release
          tar -czf ../../../ux-${{ matrix.target }}.tar.gz ux

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ux-${{ matrix.target }}
          path: ux-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ux-*
          merge-multiple: false

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --title "ux $TAG" \
            --notes-file - << 'NOTES'
          uX - Better Python Tool Runner
          See [README](README.md) for installation and usage.
          NOTES

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          find artifacts -type f -name 'ux-*.tar.gz' -exec gh release upload "$TAG" {} --clobber \;